name: Hello world Pipeline
on: 
  push:
    branches:
      - main
      - develop
      - 'release/**'
  pull_request:
    branches:
      - main
jobs:
  hello_job:
    runs-on: ubuntu-latest
    steps:
      - name: Intial Step1
        run: |
         echo "welcome to github actions ${{vars.MY_NAME}}"
         echo "these is example for multiple statementse execution"
  job2:
    runs-on: ubuntu-latest
    needs: hello_job
    steps:
      - name: job2 setp1
        run: echo "Runing job 2 and ps is ${{secrets.MY_PASSWORD}}"
  job3:
    runs-on: ubuntu-latest
    needs: job2
    steps:
      - name: job3 step1
        run: echo "running job 3 step 1 cmd"
